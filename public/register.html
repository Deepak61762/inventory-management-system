<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Register - ShipTrack</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="auth-container" style="margin: 90px auto;">
    <div class="brand-mark">ShipTrack</div>
    <h2>Create your account</h2>
    <form id="registerForm">
      <input type="text" id="username" placeholder="Username" required>
      <input type="password" id="password" placeholder="Password" required minlength="6">
      <select id="role" required>
        <option value="STAFF">Staff</option>
        <option value="ADMIN">Admin</option>
      </select>
      <input type="password" id="accessKey" placeholder="Admin access key" style="display:none;">
      <p id="accessKeyHint" style="display:none; font-size:12px; color: var(--muted); text-align:left; margin: -4px 0 0;">
        Admin accounts require an access key. Ask whoever manages this deployment for it.
      </p>
      <button type="submit">Register</button>
    </form>
    <p id="errorMsg" class="error"></p>
    <p>Already have an account? <a href="login.html">Log in here</a></p>
  </div>

  <script>
    // Only show/require the access key field when "Admin" is selected
    const roleSelect = document.getElementById('role');
    const accessKeyInput = document.getElementById('accessKey');
    const accessKeyHint = document.getElementById('accessKeyHint');

    roleSelect.addEventListener('change', () => {
      const isAdmin = roleSelect.value === 'ADMIN';
      accessKeyInput.style.display = isAdmin ? 'block' : 'none';
      accessKeyHint.style.display = isAdmin ? 'block' : 'none';
      accessKeyInput.required = isAdmin;
    });
  </script>
  <script src="js/auth.js"></script>
</body>
</html>
